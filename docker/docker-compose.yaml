version: "3.9"
services:
  dev:
    container_name: misaizu-dev
    # image: ghcr.io/newspaper8459/misaizu-image:latest
    image: misaizu-image
    build: .
    shm_size: "192g"
    volumes:
      - .:/sandbox
      - ./uv-cache:/root/.cache/uv
    working_dir: /sandbox
    stdin_open: true
    tty: true
    #runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    environment:
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # - PATH=/root/.local/bin:/usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

volumes:
  uv-cache:

