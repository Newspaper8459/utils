# プレフィックスをCtrl-aに
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
run ~/.config/tmux/plugins/tmux-prefix-highlight/prefix_highlight.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{prefix_highlight}#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

run ~/.config/tmux/plugins/tmux-cpu/cpu.tmux

unbind C-b
set -g prefix C-q
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
bind C-q send-prefix

# unbind C-d

# 分割を | と - に
unbind '"'
unbind %
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# ペイン移動をVimキーに
bind h select-pane -L
bind k select-pane -D
bind j select-pane -U
bind l select-pane -R

# 設定リロードをrに
bind r source-file ~/.tmux.conf \; display "Reloaded!"
set -g mouse on

# コピーモードのキーバインドを明示的に設定
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
# bind -T copy-mode-vi y send -X copy-selection-and-cancel "xclip -selection clipboard -in"
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"

