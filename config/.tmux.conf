# プレフィックスをCtrl-aに
unbind C-b
set -g prefix C-q
bind C-q send-prefix

# 分割を | と - に
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# ペイン移動をVimキーに
bind h select-pane -L
bind k select-pane -D
bind j select-pane -U
bind l select-pane -R

# 設定リロードをrに
bind r source-file ~/.tmux.conf \; display "Reloaded!"
